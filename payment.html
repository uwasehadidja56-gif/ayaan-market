<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment - Ayaan Market</title>

<style>

body{

    font-family: Arial, sans-serif;

    background:#f8f8f8;

    margin:0;

    padding:20px;

}

.container{

    max-width:500px;

    margin:auto;

    background:white;

    padding:20px;

    border-radius:10px;

    box-shadow:0 0 10px rgba(0,0,0,0.1);

}

h1{

    text-align:center;

    color:#ff8800;

}

input, select{

    width:100%;

    padding:12px;

    margin:10px 0;

    border:1px solid #ccc;

    border-radius:6px;

    font-size:16px;

    box-sizing:border-box;

}

button{

    width:100%;

    padding:15px;

    background:#ff8800;

    color:white;

    border:none;

    border-radius:8px;

    font-size:18px;

    cursor:pointer;

}

button:hover{

    background:#e67600;

}

</style>

</head>

<body>

<div class="container">

<h1>TEST PAYMENT PAGE</h1>

<input type="text" placeholder="Full Name">

<input type="tel" placeholder="Phone Number">
    
    <input type="text" placeholder="Delivery Address">
        
        <input type="email" placeholder="Email Address (optional)">
            
            <h3>Total Amount: <span id="totalAmount">0</span> RWF</h3>

<select>

<option>MTN Mobile Money</option>

<option>Airtel Money</option>

<option>Visa / Mastercard</option>

</select>

<button onclick="completeOrder()">

Complete Order

</button>

</div>

<script>


const total = localStorage.getItem("cartTotal") || 0;

document.getElementById("totalAmount").textContent =

Number(total).toLocaleString();

function completeOrder(){

alert("Thank you for shopping at Ayaan Market! Your order has been received successfully.");

window.location.href="index.html";

}

</script>

</body>

</html>
